
Manufacturer:
  type: object
  properties:
    manufacturerId: 
      type: integer
      format: int64
    manufacturerName: 
      type: string
      maximum: 60
    description: 
      type: string
      maximum: 255
    manufacturerUrl: 
      type: string
      maximum: 255
    aliases: 
      type: string
      maximum: 255
  required:
    - manufacturerId
    - manufacturerName
